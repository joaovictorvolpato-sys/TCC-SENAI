<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Estoque</title>
    <link rel="stylesheet" href="static/estoque.css">
    <link rel="icon" type="image/x-icon" href="static/aba.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.5/sweetalert2.all.min.js"></script>
    
</head>
<body>
        <header id="cabecalho">
        <h1>Adicionar itens ao estoque</h1>
        <p>Controle de estoque</p>
    </header>

    <div id="formulario_add">
        <form action="/inicio.html" method="POST">

  <div class="col-md-6">
    <label for="inputEmail4" class="form-label">Nome do Item</label>
    <input type="text" class="form-control" id="nome_item">
  </div>

   <div class="col-md-6">
    <label for="inputCity" class="form-label">Categoria</label>
    <input type="text" class="form-control" id="categoria">
  </div>

  <div class="col-12">
    <label for="inputAddress" class="form-label">Função</label>
    <input type="text" class="form-control" id="funcao">
  </div>

  <div class="col-12">
    <label for="inputAddress2" class="form-label">Quantidade</label>
    <input type="text" class="form-control" id="quantidade">
  </div>

  <div class="col-md-6">
    <label for="inputCity" class="form-label">Valor</label>
    <input type="text" class="form-control" id="valor">
  </div>

  <div class="col-12">

    <label for="foto">foto do seu Item:</label>
            <input type="file" id="foto" name="foto" accept="image/*"> 
  <br>

  </div>
  <div class="col-12">
    <button id="botao_cadastro" type="submit" class="btn btn-primary">Cadastrar</button>
  </div>

</form>
    </div>
</body>
</html>
