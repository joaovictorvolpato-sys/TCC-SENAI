<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirar Estoque</title>
    <link rel="stylesheet" href="static/retirar.css">
    <link rel="icon" type="image/x-icon" href="static/aba.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    

</head>
<body>
        <header id="cabecalho">
        <h1>Retirar itens do estoque</h1>
        <p>Controle de estoque</p>
    </header>

    <div id="formulario_retirar">
        <form action="/cadastro_concluido.html" method="POST">

  <div class="col-md-6">
    <label for="inputEmail4" class="form-label">Nome do Item</label>
    <input type="text" class="form-control" id="nome_item">
  </div>

  <div class="col-md-6">
    <label for="inputCity" class="form-label">Categoria</label>
    <input type="text" class="form-control" id="categoria">
  </div>

  <div class="col-12">
    <label for="inputAddress" class="form-label">Função</label>
    <input type="text" class="form-control" id="funcao">
  </div>
  <div class="col-12">
    <label for="inputAddress2" class="form-label">Quantidade</label>
    <input type="text" class="form-control" id="quantidade">
  </div>

  <div class="col-md-6">
    <label for="inputCity" class="form-label">Valor</label>
    <input type="text" class="form-control" id="valor">
  </div>

  <div class="col-12">

    <div class="mb-3">
  <label for="basic-url" class="form-label">Link da Foto</label>
  <div class="input-group">
    <span class="input-group-text" id="basic-addon3">https://example.com/users/</span>
    <input type="text" class="form-control" id="basic-url" aria-describedby="basic-addon3 basic-addon4" id="link_foto">
  </div>
    
  <br>

  </div>
  <div class="col-12">
    <button  id="botao_cadastro" type="submit" class="btn btn-primary">Cadastrar</button>
  </div>

</form>
    </div>
</body>
</html>
